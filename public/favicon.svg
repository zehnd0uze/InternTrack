<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Emerald Green rounded background to match the app's current primary color -->
  <rect width="32" height="32" rx="10" fill="#10B981"/>
  <!-- Minimalist white clock outline -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Checkmark inside the clock to signify 'Time Tracked' -->
  <polyline points="11.5,16.5 14.5,19.5 20.5,12.5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
