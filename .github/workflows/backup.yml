name: Daily Database Backup

on:
  schedule:
    # รัน 01:00 น. ทุกวัน (เวลาไทย UTC+7 = 18:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch: # รันมือได้ด้วย

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate DATABASE_URL secret
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ DATABASE_URL secret is not set!"
            echo "Please go to: GitHub Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: DATABASE_URL"
            echo "Value: Your Supabase connection string (postgresql://postgres:[password]@db.[ref].supabase.co:5432/postgres)"
            exit 1
          fi
          echo "✅ DATABASE_URL secret found"

      - name: Create database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          FILENAME="backup_${DATE}.sql"

          echo "📦 Starting backup at $DATE..."

          # Extract hostname from DATABASE_URL
          HOST=$(python3 -c "
          import sys, urllib.parse
          u = urllib.parse.urlparse('$DATABASE_URL')
          print(u.hostname)
          ")

          # Resolve hostname to IPv4 (force IPv4 — Supabase Free does not support IPv6)
          IPv4=$(python3 -c "
          import socket
          addrs = socket.getaddrinfo('$HOST', 5432, socket.AF_INET)
          print(addrs[0][4][0])
          ")
          echo "🌐 Resolved $HOST → $IPv4 (IPv4)"

          # Replace hostname with IPv4 in URL
          CONN_URL=$(echo "$DATABASE_URL" | sed "s/$HOST/$IPv4/")
          CONN_URL="${CONN_URL}?sslmode=require"

          pg_dump "$CONN_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="$FILENAME"

          gzip "$FILENAME"
          echo "✅ Backup complete: ${FILENAME}.gz ($(du -h ${FILENAME}.gz | cut -f1))"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
