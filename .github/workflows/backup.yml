name: Daily Database Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 01:00 น. ทุกวัน (UTC+7)
  workflow_dispatch:

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Validate secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret is not set!"
            exit 1
          fi
          echo "✅ DATABASE_URL found"

      - name: Install dig
        run: sudo apt-get install -y dnsutils

      - name: Backup database via Docker postgres:17
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          FILENAME="backup_${DATE}.sql"
          echo "📦 Starting backup at $DATE..."

          # Parse URL parts
          DB_USER=$(echo "$DATABASE_URL" | sed -E 's|postgresql://([^:]+):.*|\1|')
          DB_PASS=$(echo "$DATABASE_URL" | sed -E 's|postgresql://[^:]+:([^@]+)@.*|\1|')
          DB_HOST=$(echo "$DATABASE_URL" | sed -E 's|postgresql://[^@]+@([^/:]+).*|\1|')
          DB_PORT=$(echo "$DATABASE_URL" | sed -E 's|.*@[^:]+:([0-9]+)/.*|\1|')
          DB_NAME=$(echo "$DATABASE_URL" | sed -E 's|.*/([^?]+)(\?.*)?$|\1|')

          echo "🔍 Host=$DB_HOST Port=$DB_PORT DB=$DB_NAME"

          # Force IPv4 using dig A record
          IPv4=$(dig +short A "$DB_HOST" @8.8.8.8 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$IPv4" ]; then
            IPv4=$(dig +short A "$DB_HOST" @1.1.1.1 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          fi
          if [ -z "$IPv4" ]; then echo "❌ IPv4 resolution failed"; exit 1; fi
          echo "🌐 IPv4: $IPv4"

          # Use Docker postgres:17 image to run pg_dump (guarantees v17 binary)
          docker run --rm \
            -e PGPASSWORD="$DB_PASS" \
            postgres:17-alpine \
            pg_dump \
              -h "$IPv4" \
              -p "$DB_PORT" \
              -U "$DB_USER" \
              -d "$DB_NAME" \
              --no-owner \
              --no-acl \
              --format=plain \
            > "$FILENAME"

          gzip "$FILENAME"
          echo "✅ Done: ${FILENAME}.gz ($(du -h ${FILENAME}.gz | cut -f1))"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
