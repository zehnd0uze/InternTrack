name: Daily Database Backup

on:
  schedule:
    # รัน 01:00 น. ทุกวัน (เวลาไทย UTC+7 = 18:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch: # รันมือได้ด้วย

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="backup_${DATE}.sql"
          gzip "backup_${DATE}.sql"
          echo "BACKUP_FILE=backup_${DATE}.sql.gz" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90  # เก็บไว้ 90 วัน (ฟรี)
