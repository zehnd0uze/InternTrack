name: Daily Database Backup

on:
  schedule:
    # р╕гр╕▒р╕Щ 01:00 р╕Щ. р╕Чр╕╕р╕Бр╕зр╕▒р╕Щ (р╣Ар╕зр╕ер╕▓р╣Др╕Чр╕в UTC+7 = 18:00 UTC)
    - cron: '0 18 * * *'
  workflow_dispatch: # р╕гр╕▒р╕Щр╕бр╕╖р╕нр╣Др╕Фр╣Йр╕Фр╣Йр╕зр╕в

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "тЭМ DATABASE_URL secret is not set!"
            echo "Go to: GitHub Repo тЖТ Settings тЖТ Secrets and variables тЖТ Actions тЖТ New repository secret"
            echo "Name: DATABASE_URL"
            echo "Value: postgresql://postgres:[password]@db.[ref].supabase.co:5432/postgres"
            exit 1
          fi
          echo "тЬЕ DATABASE_URL secret found"

      - name: Create database backup (IPv4 forced)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          FILENAME="backup_${DATE}.sql"
          echo "ЁЯУж Starting backup at $DATE..."

          # Parse connection components from URL
          # URL format: postgresql://USER:PASSWORD@HOST:PORT/DBNAME
          DB_USER=$(echo "$DATABASE_URL" | sed -E 's|postgresql://([^:]+):.*|\1|')
          DB_PASS=$(echo "$DATABASE_URL" | sed -E 's|postgresql://[^:]+:([^@]+)@.*|\1|')
          DB_HOST=$(echo "$DATABASE_URL" | sed -E 's|postgresql://[^@]+@([^/:]+).*|\1|')
          DB_PORT=$(echo "$DATABASE_URL" | sed -E 's|.*@[^:]+:([0-9]+)/.*|\1|')
          DB_NAME=$(echo "$DATABASE_URL" | sed -E 's|.*/([^?]+)(\?.*)?$|\1|')

          echo "ЁЯФН Host: $DB_HOST | Port: $DB_PORT | DB: $DB_NAME | User: $DB_USER"

          # Force resolve to IPv4 using getent ahostsv4
          IPv4=$(getent ahostsv4 "$DB_HOST" | awk 'NR==1{print $1}')
          if [ -z "$IPv4" ]; then
            echo "тЭМ Could not resolve $DB_HOST to IPv4"
            exit 1
          fi
          echo "ЁЯМР Resolved $DB_HOST тЖТ $IPv4 (IPv4 forced)"

          # Run pg_dump with explicit flags (not URL) to avoid IPv6 resolution
          export PGPASSWORD="$DB_PASS"
          pg_dump \
            -h "$IPv4" \
            -p "$DB_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="$FILENAME"

          gzip "$FILENAME"
          SIZE=$(du -h "${FILENAME}.gz" | cut -f1)
          echo "тЬЕ Backup done: ${FILENAME}.gz ($SIZE)"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
