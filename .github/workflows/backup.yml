name: Daily Database Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 01:00 น. ทุกวัน (UTC+7)
  workflow_dispatch:

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client dnsutils

      - name: Validate secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret is not set!"
            exit 1
          fi
          echo "✅ DATABASE_URL secret found"

      - name: Backup database (IPv4 forced)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          FILENAME="backup_${DATE}.sql"
          echo "📦 Starting backup at $DATE..."

          # Parse URL parts with shell
          DB_USER=$(echo "$DATABASE_URL" | sed -E 's|postgresql://([^:]+):.*|\1|')
          DB_PASS=$(echo "$DATABASE_URL" | sed -E 's|postgresql://[^:]+:([^@]+)@.*|\1|')
          DB_HOST=$(echo "$DATABASE_URL" | sed -E 's|postgresql://[^@]+@([^/:]+).*|\1|')
          DB_PORT=$(echo "$DATABASE_URL" | sed -E 's|.*@[^:]+:([0-9]+)/.*|\1|')
          DB_NAME=$(echo "$DATABASE_URL" | sed -E 's|.*/([^?]+)(\?.*)?$|\1|')

          echo "🔍 Host=$DB_HOST Port=$DB_PORT DB=$DB_NAME User=$DB_USER"

          # Force IPv4 using dig (query A record only)
          IPv4=$(dig +short A "$DB_HOST" @8.8.8.8 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "🌐 IPv4 resolved: $IPv4"

          if [ -z "$IPv4" ]; then
            echo "❌ Could not resolve to IPv4, trying 1.1.1.1..."
            IPv4=$(dig +short A "$DB_HOST" @1.1.1.1 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            echo "🌐 IPv4 (retry): $IPv4"
          fi

          if [ -z "$IPv4" ]; then
            echo "❌ All IPv4 resolution attempts failed"
            exit 1
          fi

          # CRITICAL: unset DATABASE_URL so pg_dump cannot fall back to it
          unset DATABASE_URL

          # Run pg_dump with explicit IPv4 host
          export PGPASSWORD="$DB_PASS"
          pg_dump \
            -h "$IPv4" \
            -p "$DB_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="$FILENAME"

          gzip "$FILENAME"
          SIZE=$(du -h "${FILENAME}.gz" | cut -f1)
          echo "✅ Backup done: ${FILENAME}.gz ($SIZE)"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
